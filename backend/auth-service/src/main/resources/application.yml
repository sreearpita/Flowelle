server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/flowelle
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    com.flowelle: DEBUG

jwt:
  secret: 0cb661660f45f6bd78dc82efa01a3c2c21ac8f4c3518ed53c8000c0f30766b39
  expiration: 86400000 # 24 hours in milliseconds

cycles:
  service:
    url: http://localhost:8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
